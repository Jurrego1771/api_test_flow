  - id: CUST-RISK-018
    area: Account scope
    risk: "Una cuenta puede acceder o mutar customers de otra cuenta."
    score: 75
    priority: P0
    status: uncovered
    covered_by: []
    gap: "Sin test negativo cross-account en customer endpoints."

  - id: CUST-RISK-019
    area: Validation
    risk: "Birthday, email, phone, social fields y metadata limits validan inconsistentemente."
    score: 48
    priority: P1
    status: partial
    covered_by:
      - "TC_CST_POST_create_duplicate_email"
      - "TC_CUS_REG_007_POST_Create_SpecialCharsInName"
    gap: "Special chars y email uniqueness cubiertos. Birthday, phone, social fields sin test negativo dedicado."

  - id: CUST-RISK-020
    area: Delete/deactivate
    risk: "Deleted/deactivated customers aparecen en active flows."
    score: 48
    priority: P1
    status: covered
    covered_by:
      - "TC_CUS_REG_002_POST_Update_StatusCycle"
    gap: null

  - id: CUST-RISK-021
    area: Data masking in exports
    risk: "CSV exports leak PII o sensitive metadata inesperadamente."
    score: 60
    priority: P0
    status: uncovered
    covered_by: []
    gap: "Sin test de PII masking en CSV exports."

  - id: CUST-RISK-022
    area: Rate/limit guards
    risk: "Validation limit rules rechazan payloads válidos o permiten oversized."
    score: 36
    priority: P1
    status: uncovered
    covered_by: []
    gap: "Sin test de validateChartsLimit branches."

  - id: CUST-RISK-023
    area: Error handling
    risk: "400/404/500 behavior inconsistente across customer sub-resources."
    score: 36
    priority: P1
    status: partial
    covered_by:
      - "TC_CST_GET_by_id_not_found"
      - "TC_CST_POST_update_not_found"
    gap: "GET not-found (array vacío) y POST update not-found cubiertos. Otros sub-recursos sin test."

      - { name: TC_LIV_POST_quizzes_create_no_token, op: "POST /api/live-stream/:id/quizzes", tags: [negative], desc: "Sin token -> 401/403." }
      # Quizzes — Update
      - { name: TC_LIV_POST_quizzes_update_title, op: "POST /api/live-stream/:id/quizzes/:quizId", desc: "Actualiza el título del quiz." }
      - { name: TC_LIV_POST_quizzes_update_not_found, op: "POST /api/live-stream/:id/quizzes/:quizId", tags: [negative], desc: "quizId inexistente -> not found." }

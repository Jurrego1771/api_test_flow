# -----------------------------------------------------------------------------
# Gaps / pendientes
# -----------------------------------------------------------------------------
gaps:
  - desc: "Falta crear live-stream.risk.yaml (mapeo de riesgos del risk-register a esta cobertura)."
  - desc: "Muchos sub-recursos dependen del entorno (skip) — confirmar cobertura real en un entorno con Live habilitado."

      - { name: TC_LIV_POST_quizzes_send_valid, op: "POST /api/live-stream/:id/quizzes/:quizId/send", desc: "Envía el quiz a la audiencia." }
      # Quizzes — Delete
      - { name: TC_LIV_DELETE_quizzes_valid, op: "DELETE /api/live-stream/:id/quizzes/:quizId", desc: "Borra quiz." }
      - { name: TC_LIV_DELETE_quizzes_not_found, op: "DELETE /api/live-stream/:id/quizzes/:quizId", tags: [negative], desc: "quizId inexistente -> not found." }
      - { name: TC_LIV_DELETE_quizzes_no_token, op: "DELETE /api/live-stream/:id/quizzes/:quizId", tags: [negative], desc: "Sin token -> 401/403." }

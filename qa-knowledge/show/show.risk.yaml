module:
  name: Show
  prefix: SHW
  tests_file: qa-knowledge/show/show.tests.yaml
  scoring:
    note: "El risk-register de show usa Priority (P0..P2) + Layer, sin score numérico."
    bands: { P0: critico, P1: alto, P2: medio }

status_legend: [covered, partial, uncovered]

summary:
  total_risks: 11
  covered: 11
  partial: 0
  uncovered: 0
  note: >
    Módulo COMPLETAMENTE cubierto (83 tests). El risk-register marcaba
    SHW-007/008/011 como ✗ pero ya tienen tests reales (orphan via cascade-list,
    order auto-assign, invalid date). SHW-005 cerrado con TC_SHW_POST_episode_media_visible_in_show.
  findings:
    - id: F1
      severity: medium
      desc: >
        DELETE show/season = SOFT-delete. GET by-id del hijo sigue 200 tras borrar
        el padre; el cascade solo se observa en el LISTADO. Los tests de cascade se
        corrigieron para verificar vía listado (antes asumían hard-delete 404/500,
        fallaban 3 + 1 flaky). Ver Q3 en tests.yaml.


# =============================================================================
# QA Knowledge — Show module
# Mapa rápido de cobertura de tests para la API de Show (sm2).
# Cubre /api/show y sus sub-recursos anidados (season, episode).
# Formato: qa-knowledge/SCHEMA.md
# =============================================================================

module:
  name: Show
  prefix: TC_SHW
  base_path: /api/show
  risk_file: qa-knowledge/show/show.risk.yaml
  risk_register: doc/risk-register/show.md
  schema: schemas/show.schema.js   # + season.schema.js, episode.schema.js
  backend_source: D:/Dev/Repos/mediastream/sm2/src/server/model/schemas/show_season.js
  summary: >
    Catálogo jerárquico show -> season -> episode (tvshow/podcast). Borrado en
    cascada por SOFT-delete: al borrar show/season, los hijos desaparecen del
    LISTADO pero el GET by-id sigue devolviendo 200 (no filtra borrados). Ver Q3.

endpoints:
  - { method: POST, path: /api/show, desc: "Crea show (title + type requeridos)." }
  - { method: GET, path: /api/show/:id, desc: "Detalle (soporta populate)." }
  - { method: POST, path: /api/show/:id, desc: "Update (parcial/completo). No permite cambiar type." }
  - { method: DELETE, path: /api/show/:id, desc: "Borra show (soft-delete; cascada a seasons)." }
  - { method: "*", path: "/api/show/:id/season[/:seasonId]", desc: "CRUD de seasons anidadas." }
  - { method: "*", path: "/api/show/:id/season/:seasonId/episode[/:episodeId]", desc: "CRUD de episodes anidados." }

quirks:
  - id: Q1
    desc: "POST /api/show — la suite lo usa con JSON; el risk-register lista form:true. Ambos funcionan."
  - id: Q2
    desc: "genres debe ser valor del enum documentado (ver dataFactory.generateShowPayload); valor inválido se limpia."
  - id: Q3
    severity: medium
    type: soft-delete
    desc: >
      DELETE show/season = SOFT-delete. GET by-id del hijo sigue devolviendo 200
      tras borrar el padre; el cascade SOLO se observa en el LISTADO (la season/
      episode desaparece de GET .../season). Los tests de cascade verifican vía
      listado, no by-id (corregido — antes asumían hard-delete 404/500).
  - id: Q4
    desc: "ResourceCleaner: season id = 'showId/seasonId', episode id = 'showId/seasonId/episodeId'."
  - id: Q5
    desc: "No se puede cambiar el `type` de un show ya creado (update lo rechaza)."

# -----------------------------------------------------------------------------
# total: 83  (smoke:15  regression:22  contract:2  integration:44)
# -----------------------------------------------------------------------------

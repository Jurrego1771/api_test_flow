      - "TC_MED_002_POST_CreateFullPayload"
      - "TC_MED_004_POST_InvalidType @negative"
      - "TC_MED_010_UPDATE_ChangeTitleOnly"
      - "TC_CON_MED_001"
      - "TC_CON_MED_002"
      - "TC_CON_MED_003"
      - "Flujo: create → update → publish → verify visibility → delete @critical"
    gap: null


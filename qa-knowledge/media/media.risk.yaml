module:
  name: Media
  prefix: MEDIA-RISK
  tests_file: qa-knowledge/media/media.tests.yaml
  scoring:
    formula: "Impact x Likelihood x Detectability (1..5 c/u)"
    bands: { P0: "40-125", P1: "24-39", P2: "12-23", P3: "1-11" }

status_legend: [covered, partial, uncovered]

summary:
  total_risks: 20
  covered: 4
  partial: 6
  uncovered: 10
  note: >
    Módulo core de contenido (video/upload/processing/enriched/deletion). Cubre
    POST /api/media (form:true), sub-recursos (meta, subtitle, thumbs, preview,
    image, upload), y search. Gran superficie con muchos sub-recursos. P0 cluster:
    upload (002/003), transcode (004), DRM (013), import/RSS (016), access (017),
    deletion (019), authorization (020). 10/20 riesgos uncovered.
  p0_open:
    - { id: MEDIA-RISK-002, status: partial,   why: "Upload session happy path cubierto; invalid size/name, S3/chunked, expiration sin test." }
    - { id: MEDIA-RISK-003, status: uncovered, why: "Large file/chunk handling — sin test." }
    - { id: MEDIA-RISK-004, status: partial,   why: "Transcode state transitions cubierto partial; terminal state verification sin test." }
    - { id: MEDIA-RISK-006, status: partial,   why: "Thumbnails partial; default selection, crop, multiple thumbs sin test dedicated." }
    - { id: MEDIA-RISK-007, status: partial,   why: "Subtitles partial; main/secondary language validation, duration limits sin test." }
    - { id: MEDIA-RISK-008, status: uncovered, why: "Tracks CRUD (audio/video) — sin test." }
    - { id: MEDIA-RISK-009, status: uncovered, why: "Chapters CRUD — sin test." }
    - { id: MEDIA-RISK-010, status: uncovered, why: "Highlights lifecycle — sin test." }
    - { id: MEDIA-RISK-011, status: uncovered, why: "Ratings — sin test." }
    - { id: MEDIA-RISK-012, status: uncovered, why: "Quizzes — sin test." }
    - { id: MEDIA-RISK-013, status: uncovered, why: "DRM token issuance (POST /api/media/:id/drm/token) — sin test." }
    - { id: MEDIA-RISK-015, status: partial,   why: "Metadata partial; schema validation cubierto, updateModels/relation integrity sin test." }
    - { id: MEDIA-RISK-016, status: uncovered, why: "RSS import (POST /api/media/rss/importPlatform) — sin test." }
    - { id: MEDIA-RISK-019, status: partial,   why: "Delete partial; orphan checks para uploads/thumbs/meta sin test." }
    - { id: MEDIA-RISK-020, status: partial,   why: "Auth cross-account parcialmente cubierto; ownership leakage sin test." }


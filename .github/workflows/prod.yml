name: 🏭 Prod — Nightly (lun/mié/sáb) + Full (manual)

# Cadencia:
#  - LUN/MIÉ/SÁB (schedule): nightly DESTRUCTIVA (smoke+contract+regression) en
#    US + EU contra la cuenta QA. Misma suite que el nightly de dev (sin integration).
#    EU excluye módulos no disponibles con los tests actuales (article, epg, show:
#    show migró a microservicio gRPC api.eu.../show con contrato distinto — ver
#    matrix.include, fuente de verdad por ambiente). Escribe/borra en la cuenta QA dedicada.
#  - MANUAL  (workflow_dispatch): safe (read-only @prod-safe) | nightly | full
#    (suite COMPLETA + integration). Para regresión crítica puntual.
#
# dev sigue en push.yml + nightly.yml. Esto NO los toca.
# El prod-guard (globalSetup) exige QA_ACCOUNT=true para cualquier corrida en prod.

on:
  schedule:
    - cron: '0 6 * * 1,3,6'   # lun/mié/sáb 06:00 UTC — nightly destructiva (US + EU)
  workflow_dispatch:
    inputs:
      mode:
        description: 'safe (read-only @prod-safe) | nightly (smoke+contract+regression) | full (+ integration)'
        required: false
        default: 'nightly'
      region:
        description: 'us | eu | both'
        required: false
        default: 'both'
      workers:
        description: 'Workers paralelos (default: 4)'
        required: false
        default: '4'

# Una sola corrida de prod a la vez: no saturar prod ni chocar en gh-pages.
concurrency:
  group: prod
  cancel-in-progress: false

jobs:
  prod:
    timeout-minutes: 90
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    strategy:
      fail-fast: false
      max-parallel: 1   # secuencial: no saturar prod ni mezclar reportes
      # Disponibilidad de módulos por ambiente — ÚNICA fuente de verdad.
      # ignore_glob -> testIgnore en playwright.config.js (excluye módulos no disponibles).
      #   EU excluye article/epg (no habilitados → 403) y show (migró a microservicio
      #   gRPC api.eu.../show con contrato distinto; el monolito /api/show cuelga → 502).
      #   US corre todo. Para sumar un ambiente nuevo, agregá una entrada aquí.
      matrix:
        include:
          - region: us
            ignore_glob: ''
          - region: eu
            ignore_glob: '**/article/**,**/epg/**,**/show/**'

    steps:
      - name: 🎯 Resolver modo + si esta región corre
        id: gate
        run: |
          REGION="${{ matrix.region }}"
          EVENT="${{ github.event_name }}"
          INPUT_REGION="${{ github.event.inputs.region }}"
          INPUT_MODE="${{ github.event.inputs.mode }}"

          if [ "$EVENT" = "schedule" ]; then
            MODE="nightly"; WANT="both"
          else
            MODE="${INPUT_MODE:-nightly}"; WANT="${INPUT_REGION:-both}"
          fi

          RUN="false"
          if [ "$WANT" = "both" ] || [ "$WANT" = "$REGION" ]; then RUN="true"; fi

          echo "run=$RUN"   >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "🗺️  region=$REGION run=$RUN mode=$MODE (event=$EVENT)"

      - name: 📥 Checkout repo
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕ Setup Java (allure-commandline)
        if: steps.gate.outputs.run == 'true' && (steps.gate.outputs.mode == 'full' || steps.gate.outputs.mode == 'nightly')
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: 🩺 Monitor — @prod-safe (read-only)
        if: steps.gate.outputs.run == 'true' && steps.gate.outputs.mode == 'safe'
        run: npx playwright test --project=smoke --grep "@prod-safe" --workers=2
        env:
          BASE_URL: ${{ matrix.region == 'us' && secrets.US_BASE_URL || secrets.EU_BASE_URL }}
          API_TOKEN: ${{ matrix.region == 'us' && secrets.US_API_TOKEN || secrets.EU_API_TOKEN }}
          QA_ACCOUNT: 'true'

      - name: 🌙 Nightly — smoke + contract + regression (cuenta QA)
        if: steps.gate.outputs.run == 'true' && steps.gate.outputs.mode == 'nightly'
        run: |
          WORKERS="${{ github.event.inputs.workers || '4' }}"
          npx playwright test --project=smoke --project=contract --project=regression --workers="$WORKERS"
        env:
          BASE_URL: ${{ matrix.region == 'us' && secrets.US_BASE_URL || secrets.EU_BASE_URL }}
          API_TOKEN: ${{ matrix.region == 'us' && secrets.US_API_TOKEN || secrets.EU_API_TOKEN }}
          QA_ACCOUNT: 'true'
          IGNORE_GLOB: ${{ matrix.ignore_glob }}   # ver matrix.include (fuente de verdad por ambiente)

      - name: 🧪 Full — suite completa destructiva (cuenta QA)
        if: steps.gate.outputs.run == 'true' && steps.gate.outputs.mode == 'full'
        run: |
          WORKERS="${{ github.event.inputs.workers || '4' }}"
          npx playwright test --project=smoke --project=contract --project=regression --workers="$WORKERS"
          npx playwright test --project=integration --workers=2
        env:
          BASE_URL: ${{ matrix.region == 'us' && secrets.US_BASE_URL || secrets.EU_BASE_URL }}
          API_TOKEN: ${{ matrix.region == 'us' && secrets.US_API_TOKEN || secrets.EU_API_TOKEN }}
          QA_ACCOUNT: 'true'
          IGNORE_GLOB: ${{ matrix.ignore_glob }}   # ver matrix.include (fuente de verdad por ambiente)

      - name: 📤 Upload artifacts
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prod-${{ matrix.region }}-${{ steps.gate.outputs.mode }}-${{ github.run_number }}
          path: |
            test-results/results.json
            allure-results/
          if-no-files-found: warn
          retention-days: 14

      # ── Allure con historial por región — solo en modo full ──────────────────
      - name: 📥 Recuperar historial Allure de gh-pages
        if: always() && steps.gate.outputs.run == 'true' && (steps.gate.outputs.mode == 'full' || steps.gate.outputs.mode == 'nightly')
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-branch

      - name: 📋 Restaurar historial previo
        if: always() && steps.gate.outputs.run == 'true' && (steps.gate.outputs.mode == 'full' || steps.gate.outputs.mode == 'nightly')
        continue-on-error: true
        run: |
          mkdir -p allure-results/history
          if [ -d "gh-pages-branch/prod-${{ matrix.region }}/history" ]; then
            cp -r "gh-pages-branch/prod-${{ matrix.region }}/history/." allure-results/history/
          fi

      - name: 📊 Generar Allure Report
        if: always() && steps.gate.outputs.run == 'true' && (steps.gate.outputs.mode == 'full' || steps.gate.outputs.mode == 'nightly')
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            npm run allure:generate
          else
            mkdir -p allure-report
            echo "<html><body><h1>Sin resultados</h1></body></html>" > allure-report/index.html
          fi

      - name: 🚀 Deploy Allure a GitHub Pages (/prod-<region>/) — solo full
        if: always() && steps.gate.outputs.run == 'true' && (steps.gate.outputs.mode == 'full' || steps.gate.outputs.mode == 'nightly')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: prod-${{ matrix.region }}
          commit_message: "ci: prod-${{ matrix.region }} report [${{ github.run_number }}]"

      # Slack: monitor diario solo si falla (ruido bajo); full siempre.
      - name: 📢 Slack
        if: always() && steps.gate.outputs.run == 'true'
        run: node notify-slack.js
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUITE_NAME: "🏭 Prod ${{ steps.gate.outputs.mode }} · ${{ matrix.region == 'us' && 'US' || 'EU' }}"
          REPORT_URL: "https://jurrego1771.github.io/api_test_flow/prod-${{ matrix.region }}/"
          NOTIFY_ON_FAIL_ONLY: ${{ (steps.gate.outputs.mode == 'full' || steps.gate.outputs.mode == 'nightly') && 'false' || 'true' }}

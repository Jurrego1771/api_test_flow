name: 🏭 Prod Weekly — US + EU (cuenta QA)

# Suite completa contra producción, semanal, apuntando a la CUENTA QA dedicada
# de cada región (datos aislados, nunca clientes). El prod-guard (globalSetup)
# exige QA_ACCOUNT=true — inyectado aquí — para permitir la corrida destructiva.
#
# dev sigue en push.yml (cada push) + nightly.yml (diario). Esto NO los toca.

on:
  schedule:
    - cron: '0 6 * * 1'   # lunes 06:00 UTC — US
    - cron: '30 6 * * 1'  # lunes 06:30 UTC — EU (desfase para no solapar reportes)
  workflow_dispatch:
    inputs:
      region:
        description: 'Región a correr (us / eu / both)'
        required: false
        default: 'both'
      workers:
        description: 'Workers paralelos (default: 4)'
        required: false
        default: '4'

jobs:
  prod-suite:
    timeout-minutes: 90
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    strategy:
      fail-fast: false
      max-parallel: 1   # secuencial: evita saturar prod y mezclar reportes
      matrix:
        region: [us, eu]

    steps:
      - name: 🎯 Determinar si esta región corre
        id: gate
        run: |
          REGION="${{ matrix.region }}"
          EVENT="${{ github.event_name }}"
          INPUT_REGION="${{ github.event.inputs.region }}"
          CRON="${{ github.event.schedule }}"

          RUN="false"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            # manual: corre la región pedida (o ambas)
            if [ "$INPUT_REGION" = "both" ] || [ "$INPUT_REGION" = "$REGION" ]; then RUN="true"; fi
          else
            # schedule: 06:00 -> US, 06:30 -> EU
            if [ "$CRON" = "0 6 * * 1" ] && [ "$REGION" = "us" ]; then RUN="true"; fi
            if [ "$CRON" = "30 6 * * 1" ] && [ "$REGION" = "eu" ]; then RUN="true"; fi
          fi
          echo "run=$RUN" >> "$GITHUB_OUTPUT"
          echo "🗺️  region=$REGION run=$RUN (event=$EVENT cron='$CRON')"

      - name: 📥 Checkout repo
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕ Setup Java (allure-commandline)
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: 🩺 Health check (canario @prod-safe)
        if: steps.gate.outputs.run == 'true'
        run: npx playwright test --project=smoke --grep "@prod-safe" --workers=1
        env:
          BASE_URL: ${{ matrix.region == 'us' && secrets.US_BASE_URL || secrets.EU_BASE_URL }}
          API_TOKEN: ${{ matrix.region == 'us' && secrets.US_API_TOKEN || secrets.EU_API_TOKEN }}
          QA_ACCOUNT: 'true'

      - name: 🧪 Suite completa (cuenta QA)
        if: steps.gate.outputs.run == 'true'
        run: |
          WORKERS="${{ github.event.inputs.workers || '4' }}"
          npx playwright test --project=smoke --project=contract --project=regression --workers="$WORKERS"
          npx playwright test --project=integration --workers=2
        env:
          BASE_URL: ${{ matrix.region == 'us' && secrets.US_BASE_URL || secrets.EU_BASE_URL }}
          API_TOKEN: ${{ matrix.region == 'us' && secrets.US_API_TOKEN || secrets.EU_API_TOKEN }}
          QA_ACCOUNT: 'true'

      - name: 📤 Upload artifacts
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prod-${{ matrix.region }}-results-${{ github.run_number }}
          path: |
            test-results/results.json
            allure-results/
          if-no-files-found: warn
          retention-days: 14

      # ── Allure con historial por región (/prod-us/ , /prod-eu/) ──────────────
      - name: 📥 Recuperar historial Allure de gh-pages
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-branch

      - name: 📋 Restaurar historial previo
        if: always() && steps.gate.outputs.run == 'true'
        continue-on-error: true
        run: |
          mkdir -p allure-results/history
          if [ -d "gh-pages-branch/prod-${{ matrix.region }}/history" ]; then
            cp -r "gh-pages-branch/prod-${{ matrix.region }}/history/." allure-results/history/
            echo "✅ Historial previo copiado"
          else
            echo "ℹ️  Sin historial previo (primera ejecución)"
          fi

      - name: 📊 Generar Allure Report
        if: always() && steps.gate.outputs.run == 'true'
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            npm run allure:generate
          else
            mkdir -p allure-report
            echo "<html><body><h1>Sin resultados</h1></body></html>" > allure-report/index.html
          fi

      - name: 📢 Slack — siempre
        if: always() && steps.gate.outputs.run == 'true'
        run: node notify-slack.js
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUITE_NAME: "🏭 Prod Weekly · ${{ matrix.region == 'us' && 'US' || 'EU' }}"
          REPORT_URL: "https://jurrego1771.github.io/api_test_flow/prod-${{ matrix.region }}/"
          NOTIFY_ON_FAIL_ONLY: "false"

      - name: 🚀 Deploy a GitHub Pages (/prod-<region>/)
        if: always() && steps.gate.outputs.run == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: prod-${{ matrix.region }}
          commit_message: "ci: prod-${{ matrix.region }} report [${{ github.run_number }}]"

name: 🌙 Nightly — Smoke diario + Full (domingo)

on:
  schedule:
    - cron: '0 6 * * 1-6'  # lun–sáb 06:00 UTC: smoke + contract (ligero, ~5-10 min)
    - cron: '0 6 * * 0'    # domingo 06:00 UTC: suite completa (+ regression + integration)
  workflow_dispatch:
    inputs:
      project:
        description: 'Proyecto (smoke/regression/integration/contract) — vacío = auto según día'
        required: false
        default: ''
      workers:
        description: 'Workers paralelos (default: 4)'
        required: false
        default: '4'

# Evita que dos corridas de nightly se solapen y choquen al publicar en gh-pages.
concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  full-suite:
    timeout-minutes: 90
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: 📥 Checkout repo
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: ☕ Setup Java (requerido por allure-commandline)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🧪 Run tests
      run: |
        WORKERS="${{ github.event.inputs.workers || '4' }}"
        PROJECT="${{ github.event.inputs.project }}"
        DAY=$(date +%u)  # 1=lun … 7=dom

        if [ -n "$PROJECT" ]; then
          # workflow_dispatch con proyecto específico
          npx playwright test --project="$PROJECT" --workers="$WORKERS"
        elif [ "$DAY" = "7" ]; then
          # Domingo: suite completa (regression + integration)
          # integration corre con 2 workers para evitar race conditions en media IDs
          echo "🗓️  Domingo — suite completa"
          npx playwright test --project=smoke --project=contract --project=regression --workers="$WORKERS"
          npx playwright test --project=integration --workers=2
        else
          # Lun–sáb: smoke diario ligero (~5-10 min)
          echo "🗓️  Lun–sáb — smoke + contract"
          npx playwright test --project=smoke --project=contract --workers="$WORKERS"
        fi
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        API_TOKEN: ${{ secrets.API_TOKEN }}

    - name: 📤 Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nightly-results-${{ github.run_number }}
        path: |
          test-results/results.json
          allure-results/
        if-no-files-found: warn
        retention-days: 7

    # ── Allure con historial ─────────────────────────────────────────────────
    - name: 📥 Recuperar historial Allure de gh-pages
      if: always()
      uses: actions/checkout@v4
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages-branch

    - name: 📋 Restaurar historial previo
      if: always()
      continue-on-error: true
      run: |
        mkdir -p allure-results/history
        if [ -d "gh-pages-branch/nightly/history" ]; then
          cp -r gh-pages-branch/nightly/history/. allure-results/history/
          echo "✅ Historial previo copiado"
        else
          echo "ℹ️  Sin historial previo (primera ejecución)"
        fi

    - name: 📊 Generar Allure Report
      if: always()
      run: |
        if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
          npm run allure:generate
        else
          mkdir -p allure-report
          echo "<html><body><h1>Sin resultados</h1></body></html>" > allure-report/index.html
        fi

    - name: 📢 Slack — siempre
      if: always()
      run: node notify-slack.js
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SUITE_NAME: "🌙 Nightly · Suite Completa"
        REPORT_URL: "https://jurrego1771.github.io/api_test_flow/nightly/"
        NOTIFY_ON_FAIL_ONLY: "false"

    - name: 🚀 Deploy a GitHub Pages (/nightly/)
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        publish_branch: gh-pages
        destination_dir: nightly
        commit_message: "ci: nightly report [${{ github.run_number }}]"

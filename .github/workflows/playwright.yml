name: 🧪 Playwright Tests + Allure Report

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # ── Job 1: Ejecutar tests ────────────────────────────────────────────────────
  test:
    name: Run API Tests
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout repo
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🎭 Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: 🎭 Install Playwright Browsers
      run: npx playwright install chrome --with-deps

    - name: 🧪 Run Playwright tests
      run: npm test
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        API_TOKEN: ${{ secrets.API_TOKEN }}
        ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}

    - name: 📤 Upload Allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results/
        retention-days: 7

    - name: 📤 Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: test-results/results.json
        retention-days: 7

  # ── Job 2: Generar y publicar reporte ────────────────────────────────────────
  deploy-report:
    name: Deploy Allure Report
    needs: test
    if: always()
    timeout-minutes: 10
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: 📥 Checkout repo
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 📥 Download Allure results
      uses: actions/download-artifact@v4
      with:
        name: allure-results
        path: allure-results/

    - name: 📥 Recuperar historial Allure de gh-pages
      uses: actions/checkout@v4
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages-branch

    - name: 📋 Copiar historial previo al directorio de resultados
      continue-on-error: true
      run: |
        mkdir -p allure-results/history
        if [ -d "gh-pages-branch/history" ]; then
          cp -r gh-pages-branch/history/. allure-results/history/
          echo "✅ Historial previo copiado correctamente"
        else
          echo "ℹ️  No existe historial previo (primera ejecución)"
        fi

    - name: 📊 Generar Allure Report
      run: |
        npx allure generate allure-results --clean -o allure-report
        echo "✅ Allure Report generado en ./allure-report"

    - name: 🚀 Deploy Allure Report a GitHub Pages
      continue-on-error: true
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        publish_branch: gh-pages
        commit_message: "ci: deploy allure report [${{ github.run_number }}] - ${{ github.event_name }}"

    - name: 📥 Download Playwright results
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: playwright-report
        path: test-results/

    - name: 📢 Enviar notificación a Slack
      continue-on-error: true
      run: node notify-slack.js
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

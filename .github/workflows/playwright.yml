name: 🧪 Playwright Tests + Allure Report

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      project:
        description: 'Proyecto a correr (smoke/regression/integration/contract) — vacío = todos'
        required: false
        default: ''
      workers:
        description: 'Número de workers paralelos (default: 4)'
        required: false
        default: '4'

jobs:
  test-and-report:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: 📥 Checkout repo
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: ☕ Setup Java (requerido por allure-commandline)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🧪 Run Playwright tests
      run: |
        WORKERS="${{ github.event.inputs.workers || '4' }}"
        PROJECT="${{ github.event.inputs.project }}"
        if [ -n "$PROJECT" ]; then
          npx playwright test --project="$PROJECT" --workers="$WORKERS"
        else
          npx playwright test --workers="$WORKERS"
        fi
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        API_TOKEN: ${{ secrets.API_TOKEN }}

    - name: 📤 Upload Playwright JSON artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-artifacts
        path: |
          test-results/results.json
          playwright-report/
          allure-results/
        if-no-files-found: warn
        retention-days: 7

    # ── Allure Report (solo en push) ─────────────────────────────────────────
    - name: 📥 Recuperar historial Allure de gh-pages
      if: always() && github.event_name == 'push'
      uses: actions/checkout@v4
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages-branch

    - name: 📋 Copiar historial previo al directorio de resultados
      if: always() && github.event_name == 'push'
      continue-on-error: true
      run: |
        mkdir -p allure-results/history
        if [ -d "gh-pages-branch/history" ]; then
          cp -r gh-pages-branch/history/. allure-results/history/
          echo "✅ Historial previo copiado correctamente"
        else
          echo "ℹ️  No existe historial previo (primera ejecución)"
        fi

    - name: 📊 Generar Allure Report
      if: always() && github.event_name == 'push'
      run: |
        if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
          npx allure generate allure-results --clean -o allure-report
          echo "✅ Allure Report generado en ./allure-report"
        else
          mkdir -p allure-report
          echo "<html><body><h1>No hay resultados de test aún</h1></body></html>" > allure-report/index.html
        fi

    - name: 📢 Enviar notificación a Slack
      if: always() && github.event_name == 'push'
      run: node notify-slack.js
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: 🚀 Deploy Allure Report a GitHub Pages
      if: always() && github.event_name == 'push'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        publish_branch: gh-pages
        commit_message: "ci: deploy allure report [${{ github.run_number }}] - ${{ github.event.ref }}"

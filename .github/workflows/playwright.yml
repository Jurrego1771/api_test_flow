name: 🧪 Playwright Tests + Allure Report

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Forzar Node.js 24 en todas las actions para evitar rotura cuando Node.js 20
# sea eliminado (deadline: 2026-09-16). Detecta incompatibilidades desde ahora.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Ejecutar tests ────────────────────────────────────────────────────
  test:
    name: Run API Tests
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout repo
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🎭 Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    # Solo instala si no hubo cache hit — ahorra ~18s por run cuando hay hit
    - name: 🎭 Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chrome --with-deps

    # Si hubo cache hit, solo instala dependencias del sistema (no el browser)
    - name: 🎭 Install Playwright system deps (cache hit)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chrome

    - name: 🧪 Run Playwright tests
      run: npm test
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        API_TOKEN: ${{ secrets.API_TOKEN }}
        ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
        VMS_BASE_URL: ${{ secrets.VMS_BASE_URL }}
        VMS_TOKEN: ${{ secrets.VMS_TOKEN }}
        LIVE_SCHEDULE_ID: ${{ secrets.LIVE_SCHEDULE_ID }}
        LIVE_THUMBNAIL_ID: ${{ secrets.LIVE_THUMBNAIL_ID }}
        EMBED_HOST: ${{ secrets.EMBED_HOST }}
        EMBED_PROTOCOL: ${{ secrets.EMBED_PROTOCOL }}
        EMBED_MEDIA_ID: ${{ secrets.EMBED_MEDIA_ID }}
        EMBED_LIVE_STREAM_ID: ${{ secrets.EMBED_LIVE_STREAM_ID }}
        EMBED_PLAYLIST_ID: ${{ secrets.EMBED_PLAYLIST_ID }}
        EMBED_ACCOUNT_ID: ${{ secrets.EMBED_ACCOUNT_ID }}
        EMBED_CATEGORY_ID: ${{ secrets.EMBED_CATEGORY_ID }}
        EMBED_PLAYER_ID: ${{ secrets.EMBED_PLAYER_ID }}
        EMBED_SCHEDULE_JOB_LIVE_ID: ${{ secrets.EMBED_SCHEDULE_JOB_LIVE_ID }}
        EMBED_SCHEDULE_JOB_VOD_ID: ${{ secrets.EMBED_SCHEDULE_JOB_VOD_ID }}
        EMBED_TEST_POSTER_URL: ${{ secrets.EMBED_TEST_POSTER_URL }}
        # Suprime el spam de tips de dotenv@17 en los logs de CI
        DOTENV_QUIET: "true"

    - name: 📤 Upload Allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results/
        retention-days: 7

    - name: 📤 Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: test-results/results.json
        retention-days: 7

  # ── Job 2: Generar y publicar reporte ────────────────────────────────────────
  deploy-report:
    name: Deploy Allure Report
    needs: test
    if: always()
    timeout-minutes: 10
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: 📥 Checkout repo
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 📥 Download Allure results
      uses: actions/download-artifact@v4
      with:
        name: allure-results
        path: allure-results/

    - name: 📥 Recuperar historial Allure de gh-pages
      uses: actions/checkout@v4
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages-branch

    - name: 📋 Copiar historial previo al directorio de resultados
      continue-on-error: true
      run: |
        mkdir -p allure-results/history
        if [ -d "gh-pages-branch/history" ]; then
          cp -r gh-pages-branch/history/. allure-results/history/
          echo "✅ Historial previo copiado correctamente"
        else
          echo "ℹ️  No existe historial previo (primera ejecución)"
        fi

    - name: 📊 Generar Allure Report
      run: |
        npx allure generate allure-results --clean -o allure-report
        echo "✅ Allure Report generado en ./allure-report"

    - name: 🚀 Deploy Allure Report a GitHub Pages
      continue-on-error: true
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report
        publish_branch: gh-pages
        # force_orphan: evita los 200+ "git rm" individuales en el log —
        # reemplaza el branch completo en un solo commit limpio
        force_orphan: true
        commit_message: "ci: deploy allure report [${{ github.run_number }}] - ${{ github.event_name }}"

    - name: 📥 Download Playwright results
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: playwright-report
        path: test-results/

    - name: 📢 Enviar notificación a Slack
      continue-on-error: true
      run: node notify-slack.js
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        DOTENV_QUIET: "true"
